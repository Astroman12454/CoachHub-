databases:
  - name: coach-hub-db
    plan: free

services:
  - type: web
    name: coach-hub
    env: node
    plan: free
    buildCommand: npm install && npm run build
    preDeployCommand: npm run db:push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: coach-hub-db
          property: connectionString
